            margin-bottom: 20px;

            border-radius: 8px;
            padding: 12px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-2px);
            background: rgba(255, 255, 255, 0.1);
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: bold;
            color: #48bb78;

        .stat-label {

        .legend-title {
            font-size: 0.9rem;
            color: #fff;
            margin-bottom: 12px;
            text-align: center;
        }

            border-radius: 10px;

            font-size: 0.9rem;
            color: #fff;
            margin-bottom: 15px;
            text-align: center;
        }

            width: 100%;
            height: 6px;
            -webkit-appearance: none;
            appearance: none;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            outline: none;
        }

        .time-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 20px;
            height: 20px;
            background: #48bb78;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.3s ease;
        }

            transform: scale(1.2);
            box-shadow: 0 0 10px rgba(72, 187, 120, 0.5);

            text-align: center;
            margin-top: 12px;
            font-size: 1.5rem;
            font-weight: bold;
            color: #48bb78;
        }

        .control-buttons {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: linear-gradient(135deg, #48bb78, #38a169);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(72, 187, 120, 0.4);
        }

            background: rgba(255, 255, 255, 0.1);

            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.2);
        }

            height: 3px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            margin-top: 10px;
            overflow: hidden;
        }

            height: 100%;
            background: linear-gradient(90deg, #48bb78, #38a169);
            width: 0%;
            transition: width 0.5s ease;
        }

        .chart-section {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 20px;
            height: 250px;
        }

            width: 100%;
            height: 100%;
        }

            text-align: center;
            padding: 20px 0;
            color: #a0aec0;
            font-size: 0.8rem;
            margin-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

            .main-content {

            }

            .legend-panel, .time-control {
                min-width: 200px;
            }

            .map-wrapper {
                height: 400px;
            }
        }

            } else {
                document.getElementById('btnPlay').textContent = '暂停';
                isPlaying = true;
                playInterval = setInterval(() => {
                    if (currentYear >= 2020) {
                        currentYear = 2000;
                    } else {
                        currentYear++;
                    }
                    updateMap();
                }, 800);
            }
        });

        mapChart.setOption(getMapOption(currentYear));
        trendChart.setOption(getTrendOption());
        updateStats(currentYear);
        updateYearDisplay();

        window.addEventListener('resize', () => {
            mapChart.resize();
            trendChart.resize();
        });
    </script>
</body>

</html>
